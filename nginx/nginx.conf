# ============================================================
# Nginx - main configuration
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type   application/octet-stream;

  # Logs
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Security
  server_tokens off;
  add_header X-Frame-Options        "SAMEORIGIN"                      always;
  add_header X-Content-Type-Options  "nosniff"                         always;
  add_header X-XSS-Protection        "1; mode=block"                   always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # Rate limiting
  # TODO: test rate limits in staging after deploy.
  limit_req_zone $binary_remote_addr zone=api:10m         rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_listings:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m      rate=10r/m;

  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstreams
  upstream backend  { zone backend 64k;  least_conn; server backend:3001 resolve;  keepalive 32; }
  upstream frontend { zone frontend 64k; least_conn; server frontend:3000 resolve; keepalive 16; }

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name troca.nc www.troca.nc;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Main HTTPS server
  server {
    listen 443 ssl http2;
    server_name troca.nc www.troca.nc;

    ssl_certificate     /etc/letsencrypt/live/troca.nc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/troca.nc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 15M;

    location ^~ /api/auth {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 30s;
    }

    location ^~ /api/listings {
      limit_req zone=api_listings burst=15 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 30s;
    }

    location ^~ /api/upload/ {
      limit_req zone=upload burst=5 nodelay;
      client_max_body_size 15M;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location ^~ /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 30s;
    }

    location /uploads/ {
      alias /app/uploads/;
      expires 30d;
      add_header Cache-Control      "public, immutable";
      add_header X-Content-Type-Options nosniff;
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
      proxy_pass http://frontend;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
