# ============================================================
# Nginx — Vhost Troca (à placer dans nginx/sites/troca.nc.conf)
# ============================================================

# ── Redirection HTTP → HTTPS ────────────────────────────────
server {
    listen 80;
    server_name troca.nc www.troca.nc;

    # Certbot ACME challenge (avant la redirection)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://troca.nc$request_uri;
    }
}

# ── Redirection www → apex ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.troca.nc;

    ssl_certificate     /etc/letsencrypt/live/troca.nc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/troca.nc/privkey.pem;

    return 301 https://troca.nc$request_uri;
}

# ── HTTPS principal ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name troca.nc;

    ssl_certificate     /etc/letsencrypt/live/troca.nc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/troca.nc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Headers de sécurité ─────────────────────────────────
    # HSTS (6 mois)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Empêche le clickjacking (embedding dans une iframe)
    add_header X-Frame-Options "DENY" always;

    # Empêche le MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer : n'envoie que l'origine sur les requêtes cross-site
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions API browser
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Content Security Policy
    # self          : ressources du même domaine
    # data:         : images en base64 (Next.js)
    # blob:         : blobs (upload preview)
    # *.amazonaws.com : images S3
    # js.stripe.com : widget Stripe
    # api.stripe.com : API Stripe
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' js.stripe.com;
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: blob: *.amazonaws.com https://troca.nc;
        font-src    'self' data:;
        connect-src 'self' api.stripe.com wss://troca.nc https://troca.nc;
        frame-src   js.stripe.com hooks.stripe.com;
        object-src  'none';
        base-uri    'self';
        form-action 'self';
    " always;

    # Taille max upload (images)
    client_max_body_size 20M;

    # ── API Backend ─────────────────────────────────────────
    location /api/ {
        # Rate limit global API
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Rate limit spécifique auth (brute-force protection)
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limit upload
    location /api/upload/ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 20M;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket (messagerie temps réel) ───────────────────
    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Webhook Stripe (pas de rate limit — Stripe peut avoir des bursts) ──
    location = /api/payment/webhook {
        return 308 /api/payment/webhooks/stripe;
    }

    location /api/payment/webhooks/stripe {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend Next.js ─────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Cache des assets Next.js statiques ──────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Sitemap & robots ─────────────────────────────────────
    location = /robots.txt  { proxy_pass http://frontend; }
    location = /sitemap.xml { proxy_pass http://frontend; }
    location /sitemap-      { proxy_pass http://frontend; }
}
