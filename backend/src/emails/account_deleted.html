<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte supprimé</title>
</head>
<body style="font-family:Arial,sans-serif;background:#f5f7fb;color:#111827;margin:0;padding:24px;">
  <div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:20px;padding:28px;box-shadow:0 12px 40px rgba(15,23,42,.08);">
    <p style="margin:0 0 12px;font-size:14px;color:#0f766e;font-weight:700;text-transform:uppercase;letter-spacing:.14em;">Troca</p>
    <h1 style="margin:0 0 16px;font-size:28px;line-height:1.2;">Votre compte a été supprimé</h1>
    <p style="margin:0 0 18px;line-height:1.6;">Bonjour {{name}}, votre compte Troca a bien été supprimé. Si cette demande n’était pas de vous, contactez-nous immédiatement.</p>
    <p style="margin:0 0 18px;line-height:1.6;">Pour toute question : <a href="mailto:{{support_email}}">{{support_email}}</a></p>
    <a href="{{home_url}}" style="display:inline-block;background:#0f766e;color:#fff;text-decoration:none;padding:12px 18px;border-radius:12px;font-weight:700;">Retourner sur Troca</a>
  </div>
</body>
</html>
