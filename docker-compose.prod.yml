version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: troca_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - uploads_data:/app/uploads:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - troca_net

  certbot:
    image: certbot/certbot:latest
    container_name: troca_certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command:
      - /bin/sh
      - -c
      - tail -f /dev/null

  postgres:
    image: postgis/postgis:16-3.4
    container_name: troca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - troca_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: troca_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - troca_net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      retries: 5

  pgbouncer:
    build:
      context: ./docker/pgbouncer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-20}
      PGBOUNCER_SERVER_IDLE_TIMEOUT: ${PGBOUNCER_SERVER_IDLE_TIMEOUT:-600}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - troca_net
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 6432']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      BASE_URL: ${BASE_URL}
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      JWT_EXPIRES_IN: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PRO_MENSUEL: ${STRIPE_PRICE_PRO_MENSUEL}
      STRIPE_PRICE_PRO_ANNUEL: ${STRIPE_PRICE_PRO_ANNUEL}
      STRIPE_PRICE_PRO_PLUS_MENSUEL: ${STRIPE_PRICE_PRO_PLUS_MENSUEL}
      STRIPE_PRICE_PRO_PLUS_ANNUEL: ${STRIPE_PRICE_PRO_PLUS_ANNUEL}
      PAYPLUG_SECRET_KEY: ${PAYPLUG_SECRET_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      STORAGE_LOCAL_PATH: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      MAX_IMAGES_PER_LISTING: ${MAX_IMAGES_PER_LISTING}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      RUN_JOBS: 'false'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - troca_net

  worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    command: ['npm', 'run', 'worker']
    environment:
      NODE_ENV: production
      PORT: 3001
      BASE_URL: ${BASE_URL}
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      JWT_EXPIRES_IN: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PRO_MENSUEL: ${STRIPE_PRICE_PRO_MENSUEL}
      STRIPE_PRICE_PRO_ANNUEL: ${STRIPE_PRICE_PRO_ANNUEL}
      STRIPE_PRICE_PRO_PLUS_MENSUEL: ${STRIPE_PRICE_PRO_PLUS_MENSUEL}
      STRIPE_PRICE_PRO_PLUS_ANNUEL: ${STRIPE_PRICE_PRO_PLUS_ANNUEL}
      PAYPLUG_SECRET_KEY: ${PAYPLUG_SECRET_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      STORAGE_LOCAL_PATH: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      MAX_IMAGES_PER_LISTING: ${MAX_IMAGES_PER_LISTING}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      RUN_JOBS: 'true'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - troca_net

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_STRIPE_PK: ${NEXT_PUBLIC_STRIPE_PK}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_STRIPE_PRICE_PRO_MONTHLY: ${NEXT_PUBLIC_STRIPE_PRICE_PRO_MONTHLY}
      NEXT_PUBLIC_STRIPE_PRICE_PRO_YEARLY: ${NEXT_PUBLIC_STRIPE_PRICE_PRO_YEARLY}
      NEXT_PUBLIC_PAYPLUG_PLAN_PRO_MONTHLY: ${NEXT_PUBLIC_PAYPLUG_PLAN_PRO_MONTHLY}
      NEXT_PUBLIC_PAYPLUG_PLAN_PRO_YEARLY: ${NEXT_PUBLIC_PAYPLUG_PLAN_PRO_YEARLY}
      NEXT_PUBLIC_STRIPE_PRICE_PRO_PLUS_MONTHLY: ${NEXT_PUBLIC_STRIPE_PRICE_PRO_PLUS_MONTHLY}
      NEXT_PUBLIC_STRIPE_PRICE_PRO_PLUS_YEARLY: ${NEXT_PUBLIC_STRIPE_PRICE_PRO_PLUS_YEARLY}
      NEXT_PUBLIC_PAYPLUG_PLAN_PRO_PLUS_MONTHLY: ${NEXT_PUBLIC_PAYPLUG_PLAN_PRO_PLUS_MONTHLY}
      NEXT_PUBLIC_PAYPLUG_PLAN_PRO_PLUS_YEARLY: ${NEXT_PUBLIC_PAYPLUG_PLAN_PRO_PLUS_YEARLY}
    depends_on:
      - backend
    networks:
      - troca_net

  backup:
    build:
      context: .
      dockerfile: backup/Dockerfile
    container_name: troca_backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - backups_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - troca_net

networks:
  troca_net:
    driver: bridge

volumes:
  postgres_data:
    name: troca_postgres_data
  redis_data:
    name: troca_redis_data
  certbot_www:
    name: troca_certbot_www
  certbot_conf:
    name: troca_certbot_conf
  uploads_data:
    name: troca_uploads_data
  backups_data:
    name: troca_backups_data
